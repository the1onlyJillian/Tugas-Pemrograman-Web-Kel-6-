<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Form Data Mahasiswa</title>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
            background: #f5f5f5;
        }
        form {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        input, textarea, select {
            width: 100%;
            padding: 8px;
            margin: 5px 0 15px;
        }
        button {
            padding: 10px;
            margin-right: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .submit { background: green; color: white; }
        .reset { background: orange; color: white; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        img {
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>Form Data Mahasiswa</h2>

<form id="formMahasiswa">
    <label>NIM</label>
    <input type="text" id="nim" required>

    <label>Nama</label>
    <input type="text" id="nama" required>

    <label>Alamat</label>
    <textarea id="alamat"></textarea>

    <label>Jenis Kelamin</label><br>
    <input type="radio" name="jk" value="Pria"> Pria
    <input type="radio" name="jk" value="Wanita"> Wanita
    <input type="radio" name="jk" value="Lainnya"> Lainnya
    <br><br>

    <label>Tanggal Lahir</label>
    <select id="tanggal"></select>
    <select id="bulan">
        <option value="01">Januari</option>
        <option value="02">Februari</option>
        <option value="03">Maret</option>
        <option value="04">April</option>
        <option value="05">Mei</option>
        <option value="06">Juni</option>
        <option value="07">Juli</option>
        <option value="08">Agustus</option>
        <option value="09">September</option>
        <option value="10">Oktober</option>
        <option value="11">November</option>
        <option value="12">Desember</option>
    </select>
    <select id="tahun"></select>

    <label>Password</label>
    <input type="password" id="password">

    <button type="submit" class="submit">Submit</button>
    <button type="reset" class="reset">Reset</button>
</form>

<h2>Data Mahasiswa</h2>

<table>
    <thead>
        <tr>
            <th>NIM</th>
            <th>Nama</th>
            <th>Alamat</th>
            <th>JK</th>
            <th>TTL</th>
            <th>Password</th>
            <th>Aksi</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<script>
    const form = document.getElementById("formMahasiswa");
    const tableBody = document.getElementById("tableBody");

    // Isi dropdown tanggal & tahun
    for (let i = 1; i <= 31; i++) {
        document.getElementById("tanggal").innerHTML += `<option value="${i}">${i}</option>`;
    }

    for (let i = 1990; i <= 2025; i++) {
        document.getElementById("tahun").innerHTML += `<option value="${i}">${i}</option>`;
    }

    form.addEventListener("submit", function(e) {
        e.preventDefault();

        const nim = document.getElementById("nim").value;
        const nama = document.getElementById("nama").value;
        const alamat = document.getElementById("alamat").value;
        const jk = document.querySelector('input[name="jk"]:checked')?.value || "-";

        const tanggal = document.getElementById("tanggal").value;
        const bulan = document.getElementById("bulan").value;
        const tahun = document.getElementById("tahun").value;

        const ttl = `${tanggal}-${bulan}-${tahun}`;
        const password = document.getElementById("password").value;

        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${nim}</td>
            <td>${nama}</td>
            <td>${alamat}</td>
            <td>${jk}</td>
            <td>${ttl}</td>
            <td>${password}</td>
            <td>
                <a href="#" onclick="editRow(this)">
                    <img src="edit.png" width="20">
                </a>
                <a href="#" onclick="deleteRow(this)">
                    <img src="trash.png" width="20">
                </a>
            </td>
        `;

        tableBody.appendChild(row);
        form.reset();
    });

    function deleteRow(el) {
        el.parentElement.parentElement.remove();
    }

    function editRow(el) {
        const row = el.parentElement.parentElement;
        const cells = row.children;

        document.getElementById("nim").value = cells[0].innerText;
        document.getElementById("nama").value = cells[1].innerText;
        document.getElementById("alamat").value = cells[2].innerText;
        document.getElementById("password").value = cells[5].innerText;

        row.remove();
    }
</script>

</body>
</html>
